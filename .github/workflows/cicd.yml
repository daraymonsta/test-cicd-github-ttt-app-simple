name: CICD - Test, Merge and Deploy to EC2

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Install and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npm test


  merge:
    name: Merge dev -> main
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository (dev)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge dev into main and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main dev
          git checkout main
          git merge --no-ff origin/dev -m "Auto-merge dev into main"
          git push origin main


  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: merge

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TTT_APP_EC2_HOST }}
          username: ${{ secrets.TTT_APP_EC2_USER }}
          key: ${{ secrets.TTT_APP_EC2_SSH_KEY }}
          script: |
            echo stop and remove any container that is currently running on port 3000
            docker ps -q --filter "publish=3000" | xargs -r docker rm -f
            
            if [ -d "repo" ]; then
                echo repo folder exists, so remove and clone repo
                rm -rf repo
                git clone $REPO repo
                cd repo
                #complicated to git pull as multiple repos' pipelines may run the app on the same deployment server
                #git remote set-url origin $REPO
                #git pull origin main
            else
                echo repo folder does not exist, so clone repo
                git clone $REPO repo
                cd repo
            fi
            cd app
            npm ci --omit=dev
            pm2 restart ttt-app || pm2 start npm --name ttt-app -- start

            echo configure pm2 to start on system boot
            pm2 save
            sudo env PATH=$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u ${{ secrets.TTT_APP_EC2_USER }} --hp /home/${{ secrets.TTT_APP_EC2_USER }}
            
